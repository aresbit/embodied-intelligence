# 具身智能导论 — GitHub Pages 配置
title: 具身智能导论
description: 《具身智能导论》— UC Berkeley CS294-291 "Robots That Learn" 中文翻译与详解
lang: zh-CN

# Cayman 主题 (与 CII 项目一致)
remote_theme: pages-themes/cayman@v0.2.0
plugins:
  - jekyll-remote-theme

# 导航
show_downloads: false
google_analytics:

# 构建
markdown: kramdown
kramdown:
  input: GFM
  # kramdown v2.3+ (GitHub Pages 现用版本) 的 mathjax 引擎会把
  # $$...$$ 转为行内 \(...\) 或独占段落的块级 \[...\]，MathJax 3 可直接识别。
  # 注意: 不能设为 nil —— 那会把公式包进 <pre>，反被 MathJax 跳过。
  # 前提是公式必须用 $$ 分隔符 (kramdown 不识别单个 $)。
  math_engine: mathjax
encoding: UTF-8
